name: Deploy OpenClaw Chat

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: openclaw-chat-files
      R2_LOCATION: enam
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify required GitHub secrets
        env:
          CHAT_PASSWORD: ${{ secrets.CHAT_PASSWORD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          for name in CHAT_PASSWORD CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID OPENAI_API_KEY OPENAI_BASE_URL SESSION_SECRET; do
            if [ -z "${!name}" ]; then
              echo "Missing GitHub secret: $name" >&2
              exit 1
            fi
          done

      - name: Ensure R2 bucket exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if ! npx wrangler r2 bucket info "$R2_BUCKET_NAME" >/dev/null 2>&1; then
            npx wrangler r2 bucket create "$R2_BUCKET_NAME" --location="$R2_LOCATION"
          fi

      - name: Sync Worker secrets
        env:
          CHAT_PASSWORD: ${{ secrets.CHAT_PASSWORD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          printf '%s' "$OPENAI_API_KEY" | npx wrangler secret put OPENAI_API_KEY
          if [ -n "$OPENAI_BASE_URL" ]; then
            printf '%s' "$OPENAI_BASE_URL" | npx wrangler secret put OPENAI_BASE_URL
          fi
          printf '%s' "$SESSION_SECRET" | npx wrangler secret put SESSION_SECRET
          printf '%s' "$CHAT_PASSWORD" | npx wrangler secret put CHAT_PASSWORD

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
