<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <title>OpenClaw Chat</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" src="/app.js"></script>
  </head>
  <body>
    <div id="noticeBanner" class="notice hidden"></div>

    <div class="app-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1 id="appName">OpenClaw Chat</h1>
        </div>

        <form id="loginForm" class="sidebar-section">
          <input
            class="ghost-field"
            type="text"
            name="username"
            autocomplete="username"
            value="openclaw"
            tabindex="-1"
            aria-hidden="true"
          />
          <input type="password" id="passwordInput" placeholder="Enter password..." />
          <button id="loginButton" class="primary-button" type="submit">Login</button>
        </form>

        <div id="sessionSummary" class="sidebar-section hidden">
          <span class="session-user">Logged in</span>
          <button id="logoutButton" class="ghost-button" type="button">Logout</button>
        </div>

        <section id="libraryPanel" class="sidebar-content disabled">
          <div class="upload-section">
            <label id="uploadZone" class="upload-zone" for="fileInput">
              <span class="upload-text">+ Upload Files</span>
              <input type="file" id="fileInput" multiple />
            </label>
          </div>

          <div class="file-header">
            <span>Library (<span id="fileCount">0</span>)</span>
          </div>

          <div id="fileList"></div>
        </section>
      </aside>

      <main class="chat-area">
        <div id="messages" class="messages-container">
          <div id="emptyState" class="empty-state">
            <h2>How can I help you today?</h2>
            <div class="suggestion-cards">
              <div class="suggestion-card">Plan a trip to explore nature</div>
              <div class="suggestion-card">Explain complex code logic</div>
              <div class="suggestion-card">Brainstorm product names</div>
              <div class="suggestion-card">Help me draft an email</div>
            </div>
          </div>
        </div>

        <div class="composer-container">
          <div class="composer-inner">
            <div class="pending-row hidden">
              <div id="pendingAttachments" class="pending-list"></div>
              <button id="clearPendingButton" class="ghost-button" type="button">
                Clear
              </button>
            </div>

            <form id="composer" class="composer-box disabled">
              <textarea id="messageInput" rows="1" placeholder="Message AI..."></textarea>
              <button id="sendButton" class="primary-button send-btn" type="submit">
                <span class="send-label">Send</span>
                <svg
                  class="send-icon"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <line x1="22" y1="2" x2="11" y2="13"></line>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
              </button>
            </form>

            <div id="composerHint" class="hint">
              AI can make mistakes. Consider verifying important information.
            </div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
